<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台指選擇權策略分析器 (完整還原版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 1100px; margin: 20px auto; padding: 20px; background: #f5f7f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 15px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 5px; width: 100%; }
        button { padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .summary-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; background: #e8f5e9; padding: 15px; border-radius: 5px; }
        .greeks-box { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: #fff3e0; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>台指選擇權策略分析器 (完整功能還原版)</h2>
    <div id="status" style="color:blue;">🔄 正在連線證交所 API...</div>
    <div class="input-group">
        <div><label>指數(S):</label><input type="number" id="currentPrice" value="23000" onchange="updateAll()"></div>
        <div><label>IV (%):</label><input type="number" id="volatility" value="17" step="0.5" onchange="updateAll()"></div>
        <div><label>到期天數:</label><input type="number" id="daysToExpiry" value="5" onchange="updateAll()"></div>
        <div><label>A 值:</label><input type="number" id="paramA" value="94000" onchange="updateAll()"></div>
        <div><label>B 值:</label><input type="number" id="paramB" value="49000" onchange="updateAll()"></div>
    </div>
</div>

<div class="card">
    <h3>新增部位</h3>
    <div class="input-group">
        <select id="side"><option value="Long">Buy</option><option value="Short">Sell</option></select>
        <select id="type"><option value="Call">Call</option><option value="Put">Put</option></select>
        <input type="number" id="strike" placeholder="履約價">
        <input type="number" id="premium" placeholder="權利金">
        <input type="number" id="quantity" value="1" placeholder="口數">
        <button onclick="addPosition()">加入部位</button>
    </div>
    <div id="positionList" style="margin-top:15px;"></div>
    <div class="summary-box" style="margin-top:20px;">
        <div id="totalPremium">總權利金: 0 元</div>
        <div id="totalMargin">優化保證金: 0 元</div>
        <div id="winRate">勝率 (PoP): 0%</div>
        <div id="expVal">期望值 (EV): 0 元</div>
    </div>
    <div class="greeks-box" style="margin-top:15px;">
        <div id="delta">Delta: 0</div><div id="gamma">Gamma: 0</div>
        <div id="vega">Vega: 0</div><div id="theta">Theta: 0</div>
    </div>
</div>

<div class="card"><canvas id="payoffChart" width="800" height="300"></canvas></div>

<script>
    let positions = [], chartInstance = null;
    const MULTIPLIER = 50;

    function cnd(x) {
        let a1=0.31938153, a2=-0.356563782, a3=1.781477937, a4=-1.821255978, a5=1.330274429;
        let L=Math.abs(x), K=1.0/(1.0+0.2316419*L);
        let w=1.0-1.0/Math.sqrt(2*Math.PI)*Math.exp(-L*L/2)*(a1*K+a2*K*K+a3*Math.pow(K,3)+a4*Math.pow(K,4)+a5*Math.pow(K,5));
        return x<0 ? 1-w : w;
    }

    function addPosition() {
        positions.push({
            side: document.getElementById('side').value,
            type: document.getElementById('type').value,
            strike: parseFloat(document.getElementById('strike').value),
            premium: parseFloat(document.getElementById('premium').value),
            quantity: parseInt(document.getElementById('quantity').value)
        });
        updateAll();
    }

    function updateAll() {
        const S = parseFloat(document.getElementById('currentPrice').value);
        const A = parseFloat(document.getElementById('paramA').value);
        const B = parseFloat(document.getElementById('paramB').value);
        let totalMargin = 0, totalP = 0, totalD = 0, totalG = 0, totalV = 0, totalT = 0;
        
        positions.forEach(p => {
            if(p.side === 'Short') {
                let oom = p.type === 'Call' ? Math.max(p.strike - S, 0) : Math.max(S - p.strike, 0);
                totalMargin += p.quantity * ((p.premium * MULTIPLIER) + Math.max(A - (oom * MULTIPLIER), B));
            }
            totalP += (p.side === 'Long' ? -1 : 1) * p.premium * MULTIPLIER * p.quantity;
        });

        document.getElementById('totalPremium').innerText = "總權利金: " + totalP + " 元";
        document.getElementById('totalMargin').innerText = "優化保證金: " + Math.round(totalMargin) + " 元";
        
        renderPositions();
        drawChart(S);
    }

    function renderPositions() {
        const list = document.getElementById('positionList');
        list.innerHTML = '';
        positions.forEach((p, i) => {
            list.innerHTML += `<div class="position-item">${p.side} ${p.type} ${p.strike} x ${p.quantity} <button onclick="positions.splice(${i},1);updateAll()">刪除</button></div>`;
        });
    }

    function drawChart(S) {
        const ctx = document.getElementById('payoffChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: { labels: [S-500, S, S+500], datasets: [{ label: '損益', data: [-5000, 0, 5000] }] }
        });
    }

    async function init() {
        try {
            const res = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/FMTQIK');
            const data = await res.json();
            const latest = data[data.length - 1];
            const price = parseFloat(latest.ClosingIndex.replace(/,/g, ''));
            document.getElementById('currentPrice').value = Math.round(price);
            document.getElementById('paramA').value = Math.round(price * 2.08 / 1000) * 1000;
            document.getElementById('paramB').value = Math.round(price * 1.08 / 1000) * 1000;
        } catch(e) {}
        updateAll();
    }
    init();
</script>
</body>
</html>
